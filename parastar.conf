#!/usr/bin/env bash

########################################
# PARASTAR CONFIGURATION FILE
########################################

##########
# SLURM
##########

SBATCH_JOB_NAME="parastar"           # Name of the SLURM job
SBATCH_PARTITION="set_own_partition" # Adjust this to your cluster's partition name
SBATCH_NODES=1                       # Number of nodes to use
SBATCH_CPUS_PER_TASK=24              # Number of CPU cores per task, adjust based on your system
SBATCH_MEM="64G"                     # Memory per node, adjust based on your system
SBATCH_TIME="24:00:00"               # Time limit for the job (e.g., 24 hours)
SBATCH_OUTPUT="slurm-%j.out"         # Output log file, %j will be replaced with the job ID
SBATCH_ERROR="slurm-%j.err"          # Error log file, %j will be replaced with the job ID

##########
# INPUT FILES
##########

FASTQ_DIR="fastq_files"                     # Directory containing the FASTQ files, adjust as needed
GENOME_FASTA="Genomes/dm6/dm6.fa"           # Adjust this to your genome FASTA file path
GTF_FILE="Genomes/dm6/dmel-all-r6.62.gtf"   # Adjust this to your GTF file path

##########
# OUTPUTS
##########

OUTPUT_DIR="results"               # Directory to store STAR output
GENOME_INDEX_DIR="genome_index"    # Directory to store STAR genome index
LOG_DIR="logs"                     # Directory to store log files
TMP_DIR="tmp"                      # Directory for temporary files

##########
# STAR SETTINGS
##########

STAR_THREADS=12                    # Number of threads for STAR, adjust based on your system
STAR_OVERHANG=99                   # Read length - 1 (default for 100bp reads, adjust if your reads are different)
STAR_RAM_LIMIT=32000000000         # RAM limit for STAR in bytes (e.g., 32GB = 32 * 10^9 bytes)

##########
# PARALLEL SETTINGS
##########

PARALLEL_JOBS=2                    # Number of parallel jobs to run

##########
# PIPELINE BEHAVIOR
##########

SKIP_COMPLETED=true                # Set to true to skip samples that have already been processed
VALIDATE_GZIP=true                 # Set to true to validate that FASTQ files are gzipped before processing
CREATE_GENOME_INDEX=true           # Set to true to create the genome index if it doesn't exist
FORCE_REBUILD_INDEX=false          # Set to true to force rebuilding the genome index even if it already exists
DRY_RUN=false                      # Set to true to print the commands that would be executed without actually running them (for testing purposes)

##########
# FILE PATTERNS
##########

R1_PATTERN="_R1_001.fastq.gz"      # Pattern to identify R1 FASTQ files, adjust as needed
R2_PATTERN="_R2_001.fastq.gz"      # Pattern to identify R2 FASTQ files, adjust as needed

##########
# STAR EXTRA OPTIONS
##########

STAR_EXTRA_ARGS=(
  --outSAMtype BAM SortedByCoordinate    # Output sorted BAM files
  --outSAMattributes Standard            # Include standard attributes in the output BAM
  --quantMode GeneCounts                 # Enable gene counting for downstream analysis
)
